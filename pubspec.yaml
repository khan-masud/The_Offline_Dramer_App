name: tod
description: "The Offline Dreamer - Your Personal Life Manager"
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Storage & Security
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  http: ^1.6.0
  fl_chart: ^1.2.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
